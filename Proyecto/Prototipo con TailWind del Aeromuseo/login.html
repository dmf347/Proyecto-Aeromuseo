<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Usuarios | Aeromuseo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-900 min-h-screen flex text-slate-100 antialiased relative overflow-hidden">

    <!-- Background Elements -->
    <div class="absolute inset-0 z-0">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c7/Museo_Aeronautico_Malaga_-_Terminal_Historica.jpg"
            class="w-full h-full object-cover opacity-20 mix-blend-luminosity">
        <div class="absolute inset-0 bg-gradient-to-tr from-blue-900/80 via-slate-900 to-cyan-900/50"></div>
    </div>

    <!-- Decorative Blurs -->
    <div class="absolute top-20 right-20 w-96 h-96 bg-cyan-500/30 rounded-full blur-3xl z-0"></div>
    <div class="absolute bottom-10 left-10 w-72 h-72 bg-blue-600/30 rounded-full blur-3xl z-0"></div>

    <div class="relative z-10 w-full max-w-4xl mx-auto flex flex-col justify-center px-6">

        <!-- Header minimal -->
        <div class="absolute top-6 left-6 md:top-10 md:left-10">
            <a href="inicio.html" class="flex items-center text-slate-300 hover:text-white transition group">
                <div class="bg-white/10 p-2 rounded-full mr-3 backdrop-blur-md group-hover:bg-white/20 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                </div>
                <span class="font-medium">Volver a inicio</span>
            </a>
        </div>

        <!-- Login Container -->
        <div
            class="flex flex-col md:flex-row bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl shadow-2xl overflow-hidden self-center w-full my-20">

            <!-- Branding Panel -->
            <div
                class="w-full md:w-5/12 hidden md:flex flex-col justify-center items-center p-12 bg-gradient-to-b from-blue-600/20 to-blue-900/40 border-r border-white/5">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR7i0cfvOixdV5yLBKaGl53O_pi-CI6G5vjxQ&s"
                    alt="Logo" class="w-24 rounded-2xl mb-8 shadow-xl">
                <h2 class="text-3xl font-bold text-center mb-4">Portal de Gestión</h2>
                <p class="text-slate-400 text-center leading-relaxed">
                    Inicia sesión para reservar visitas guiadas (Visitantes) o administrar la plataforma y sus eventos
                    (Admins).
                </p>
            </div>

            <!-- Form Panel -->
            <div class="w-full md:w-7/12 p-10 md:p-14">
                <h3 class="text-3xl font-bold mb-2">Bienvenido de nuevo</h3>
                <p class="text-slate-400 mb-8">Ingresa tus credenciales para continuar</p>

                <form action="#" method="POST" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-2">Correo Electrónico</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <svg class="h-5 w-5 text-slate-500" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                                    </path>
                                </svg>
                            </div>
                            <input type="email" required
                                class="w-full bg-black/20 border border-slate-700/50 rounded-xl py-3 pl-11 pr-4 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition"
                                placeholder="tu@email.com">
                        </div>
                    </div>

                    <div>
                        <div class="flex items-center justify-between mb-2">
                            <label class="block text-sm font-medium text-slate-300">Contraseña</label>
                            <a href="#"
                                class="text-sm font-medium text-cyan-400 hover:text-cyan-300 transition">¿Olvidaste tu
                                contraseña?</a>
                        </div>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <svg class="h-5 w-5 text-slate-500" fill="none" viewBox="0 0 24 24"
                                    stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                                    </path>
                                </svg>
                            </div>
                            <input type="password" required
                                class="w-full bg-black/20 border border-slate-700/50 rounded-xl py-3 pl-11 pr-4 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition"
                                placeholder="••••••••">
                        </div>
                    </div>

                    <div class="flex items-center">
                        <input id="remember-me" name="remember-me" type="checkbox"
                            class="h-4 w-4 rounded border-slate-700 bg-slate-800 text-cyan-500 focus:ring-cyan-500">
                        <label for="remember-me" class="ml-2 block text-sm text-slate-300">Mantener sesión
                            iniciada</label>
                    </div>

                    <button type="submit"
                        class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-xl shadow-lg shadow-cyan-500/20 text-sm font-bold text-white bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-cyan-500 focus:ring-offset-slate-900 transform hover:-translate-y-0.5 transition-all duration-200">
                        Acceder
                    </button>
                </form>

                <p class="mt-8 text-center text-sm text-slate-400">
                    ¿Aún no te has registrado?
                    <a href="#" class="font-medium text-cyan-400 hover:text-cyan-300 transition">Crear cuenta</a>
                </p>
            </div>
        </div>
    </div>
</body>

</html>
