<div class="bg-slate-900 min-h-screen flex text-slate-100 antialiased relative overflow-hidden items-center justify-center">

    <!-- Background Elements -->
    <div class="absolute inset-0 z-0">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c7/Museo_Aeronautico_Malaga_-_Terminal_Historica.jpg"
            class="w-full h-full object-cover opacity-20 mix-blend-luminosity">
        <div class="absolute inset-0 bg-gradient-to-tr from-blue-900/80 via-slate-900 to-cyan-900/50"></div>
    </div>

    <!-- Decorative Blurs -->
    <div class="absolute top-20 right-20 w-96 h-96 bg-cyan-500/30 rounded-full blur-3xl z-0"></div>
    <div class="absolute bottom-10 left-10 w-72 h-72 bg-blue-600/30 rounded-full blur-3xl z-0"></div>

    <div class="relative z-10 w-full max-w-md mx-auto px-6">
        
        <div class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl shadow-2xl overflow-hidden p-10 text-center">
            
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR7i0cfvOixdV5yLBKaGl53O_pi-CI6G5vjxQ&s"
                alt="Logo" class="w-20 mx-auto rounded-2xl mb-6 shadow-xl">
            
            <h2 class="text-2xl font-bold mb-2">Restablecer Contraseña</h2>
            <p class="text-slate-400 mb-6 text-sm">Introduce tu nueva contraseña a continuación.</p>

            <!-- Mensaje de error -->
            <div *ngIf="error"
                class="mb-6 flex items-center gap-3 bg-red-500/10 border border-red-500/30 text-red-400 rounded-xl px-4 py-3 text-sm text-left">
                <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" />
                </svg>
                {{ error }}
            </div>

            <!-- Mensaje de éxito -->
            <div *ngIf="successMessage"
                class="mb-6 flex items-center gap-3 bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 rounded-xl px-4 py-3 text-sm text-left">
                <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                </svg>
                {{ successMessage }}
            </div>

            <!-- Formulario de nueva contraseña (solo si hay token y no hay éxito) -->
            <form *ngIf="token && !successMessage" (ngSubmit)="onSubmit()" #resetForm="ngForm" class="space-y-5 text-left">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Nueva Contraseña</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                            </svg>
                        </div>
                        <input type="password" name="password" [(ngModel)]="password" required
                            class="w-full bg-black/20 border border-slate-700/50 rounded-xl py-3 pl-11 pr-4 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-cyan-500 transition"
                            placeholder="Mínimo 6 caracteres">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Confirmar Contraseña</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                            </svg>
                        </div>
                        <input type="password" name="confirmPassword" [(ngModel)]="confirmPassword" required
                            class="w-full bg-black/20 border border-slate-700/50 rounded-xl py-3 pl-11 pr-4 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-cyan-500 transition"
                            placeholder="Repite la contraseña">
                    </div>
                </div>

                <button type="submit" [disabled]="cargando"
                    class="w-full flex justify-center items-center gap-3 py-3.5 px-4 rounded-xl shadow-lg shadow-cyan-500/20 text-sm font-bold text-white bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 focus:outline-none transition-all duration-200 disabled:opacity-60 disabled:cursor-not-allowed">
                    
                    <svg *ngIf="cargando" class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg"
                        fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>

                    {{ cargando ? 'Guardando...' : 'Cambiar Contraseña' }}
                </button>
            </form>

            <div class="mt-8">
                <a routerLink="/login"
                    class="inline-flex items-center justify-center py-2 px-6 rounded-full border border-slate-600 hover:bg-white/5 transition text-sm font-medium text-slate-300 hover:text-white">
                    Volver al inicio de sesión
                </a>
            </div>

        </div>
    </div>
</div>
